# Production template. Prefer Admin -> Payment for Alipay secrets.

server:
  listen: "127.0.0.1:8088"
  public_base_url: "https://pay.example.com"
  admin_token: "change-me"

db:
  driver: sqlite
  dsn: "data/giftcard.db"

alipay:
  mock_pay: false
  bill_subject: "Digital Goods"
  is_production: true
  product: "page"
  timeout_express: "30m"

# 彩虹易支付 / V1 易支付（也可在 Admin -> Payment 配置）
epay:
  enabled: false
  api_url: "https://pay.example.com"
  pid: ""
  key: ""
  types: "alipay,wxpay"
  name: "Digital Goods"

notify_worker:
  max_attempts: 12
  base_backoff_sec: 5
  poll_interval_sec: 2

expire_worker:
  interval_sec: 15
  batch_size: 100

security:
  sign_skew_sec: 300
  https_only: true
  ssrf_block_private_ip: true

seed_merchant:
  app_id: "k2-main"
  name: "K2Board"
  api_secret: "change-me-secret"

admin:
  username: "admin"
  password: "change-me"
  jwt_secret: "change-me-jwt"
  site_name: "NexusCard"

shop:
  title: "NexusCard Store"
  subtitle: "美区 Apple ID · 礼品卡 · Netflix / Google · 流量套餐 · 自动发货"
  order_ttl_min: 30

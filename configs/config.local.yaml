# Minimal local config. Configure Alipay in Admin -> Payment (hot reload).
server:
  listen: ":8088"
  public_base_url: "http://127.0.0.1:8088"
  admin_token: "dev-admin-token"

db:
  driver: sqlite
  dsn: "data/giftcard.db"

alipay:
  mock_pay: true
  bill_subject: "Digital Goods"
  is_production: false
  product: "page"
  timeout_express: "30m"

notify_worker:
  max_attempts: 12
  base_backoff_sec: 2
  poll_interval_sec: 1

expire_worker:
  interval_sec: 10
  batch_size: 100

security:
  sign_skew_sec: 300
  https_only: false
  ssrf_block_private_ip: false

seed_merchant:
  app_id: "k2-main"
  name: "K2Board Local"
  api_secret: "test_secret"

admin:
  username: "admin"
  password: "admin123"
  jwt_secret: "dev-jwt-secret-change-me"
  site_name: "卡卡基地"

shop:
  title: "卡卡基地"
  subtitle: "美区 Apple ID · 礼品卡 · Netflix / Google · 软件账号 · 自动发货"
  order_ttl_min: 30
